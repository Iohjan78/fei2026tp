services:
  baseDatos:
    image: postgres:16
    container_name: baseDatos
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
     - ./data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
